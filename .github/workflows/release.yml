name: Release Multi-Platform (v1)
on:
  workflow_dispatch:
    inputs:
      platforms:
        type: string
        default: 'all'
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.det.outputs.stack }}
      version: ${{ steps.det.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: det
        run: |
          RESULT=$(./.github/scripts/detect-stack.sh)
          echo "$RESULT"
          echo "stack=$(echo "$RESULT" | jq -r '.stack')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$RESULT" | jq -r '.version // "0.0.1"')" >> "$GITHUB_OUTPUT"

  parse:
    runs-on: ubuntu-latest
    needs: [detect]
    outputs:
      version: ${{ steps.p.outputs.version }}
      windows: ${{ steps.p.outputs.windows }}
      macos: ${{ steps.p.outputs.macos }}
      linux: ${{ steps.p.outputs.linux }}
      android: ${{ steps.p.outputs.android }}
      ios: ${{ steps.p.outputs.ios }}
    steps:
      - id: p
        run: |
          pl="${{ inputs.platforms }}"
          [ "$pl" = "all" ] || [ -z "$pl" ] && pl="windows,macos,linux,android,ios"
          for p in windows macos linux android ios; do
            if echo ",$pl," | grep -q ",$p,"; then echo "$p=true" >> "$GITHUB_OUTPUT"
            else echo "$p=false" >> "$GITHUB_OUTPUT"; fi
          done
          v="${{ needs.detect.outputs.version }}"
          [ -z "$v" ] && v="0.0.1"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "parsed: windows=${{ steps.p.outputs.windows }} v=$v"

  build-linux:
    needs: [detect, parse]
    runs-on: ubuntu-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: linux
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-linux
          path: dist/
          if-no-files-found: ignore

  release:
    needs: [detect, parse, build-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts/ }
      - name: List artifacts
        run: ls -laR artifacts/ || true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.parse.outputs.version }}
          name: Release v${{ needs.parse.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
