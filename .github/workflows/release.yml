# .github/workflows/release.yml
# Generated by github-multiplatform-packager skill. Do not edit manually.
# To customize, edit templates/release.yml.tpl and re-run skill setup.

name: Release Multi-Platform

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '启用的打包平台 (逗号分隔: windows,macos,linux,android,ios 或 all)'
        type: string
        required: true
        default: 'all'
      version:
        description: '版本号 (留空则用 git tag 或自动检测)'
        required: false
        default: ''
      dry_run:
        description: '仅构建不发布 Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ---- 1. Detect project stack ----
  detect:
    name: Detect stack
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.det.outputs.stack }}
      build_tool: ${{ steps.det.outputs.build_tool }}
      entry_point: ${{ steps.det.outputs.entry_point }}
      version: ${{ steps.det.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: det
        run: |
          ./.github/scripts/detect-stack.sh > /tmp/detect.json || echo '{"stack":"unknown"}' > /tmp/detect.json
          cat /tmp/detect.json
          stack=$(jq -r '.stack // "unknown"' /tmp/detect.json)
          build_tool=$(jq -r '.build_tool // ""' /tmp/detect.json)
          entry_point=$(jq -r '.entry_point // ""' /tmp/detect.json)
          version=$(jq -r '.version // ""' /tmp/detect.json)
          echo "stack=$stack"        >> "$GITHUB_OUTPUT"
          echo "build_tool=$build_tool" >> "$GITHUB_OUTPUT"
          echo "entry_point=$entry_point" >> "$GITHUB_OUTPUT"
          echo "version=$version"    >> "$GITHUB_OUTPUT"

  # ---- 2. Parse platforms input ----
  parse:
    name: Parse platforms
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.p.outputs.windows }}
      macos: ${{ steps.p.outputs.macos }}
      linux: ${{ steps.p.outputs.linux }}
      android: ${{ steps.p.outputs.android }}
      ios: ${{ steps.p.outputs.ios }}
      version: ${{ steps.p.outputs.version }}
    steps:
      - id: p
        run: |
          pl="${{ inputs.platforms }}"
          if [ "$pl" = "all" ] || [ -z "$pl" ]; then
            pl="windows,macos,linux,android,ios"
          fi
          for p in windows macos linux android ios; do
            if echo ",$pl," | grep -q ",$p,"; then
              echo "$p=true" >> "$GITHUB_OUTPUT"
            else
              echo "$p=false" >> "$GITHUB_OUTPUT"
            fi
          done
          # Resolve version:
          #   1) inputs.version   (workflow_dispatch with explicit version)
          #   2) github.ref_name if it's a tag      (push tag event)
          #   3) detect.outputs.version             (any event, fallback to project)
          #   4) "0.0.1"                            (last resort)
          v="${{ inputs.version }}"
          if [ -z "$v" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              v="${{ github.ref_name }}"
              v="${v#v}"
            fi
          fi
          if [ -z "$v" ]; then
            v="${{ needs.detect.outputs.version }}"
          fi
          if [ -z "$v" ] || [ "$v" = "null" ]; then
            v="0.0.1"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "resolved_version=$v"

  # ---- 3. Build jobs (5 platforms) ----
  # Note: anchor source (base_build) has a generic build step. Each platform
  # overrides at the job level: runs-on, if, env.{STACK,PLATFORM,VERSION}.
  build-windows: &base_build
    name: Build (windows)
    needs: [detect, parse]
    if: ${{ needs.parse.outputs.windows == 'true' }}
    runs-on: windows-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: windows
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: ${{ needs.detect.outputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Setup Node
        if: ${{ needs.detect.outputs.stack == 'electron' || needs.detect.outputs.stack == 'node' || needs.detect.outputs.stack == 'node-cli' || needs.detect.outputs.stack == 'neutralino' }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Setup Rust
        if: ${{ needs.detect.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Go
        if: ${{ needs.detect.outputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Setup Flutter
        if: ${{ needs.detect.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0' }
      - name: Setup Java
        if: ${{ needs.detect.outputs.stack == 'java' || needs.detect.outputs.stack == 'android-native' }}
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup .NET
        if: ${{ needs.detect.outputs.stack == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-windows
          path: dist/
          if-no-files-found: ignore

  build-macos:
    <<: *base_build
    name: Build (macos)
    if: ${{ needs.parse.outputs.macos == 'true' }}
    runs-on: macos-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: macos
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: ${{ needs.detect.outputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Setup Node
        if: ${{ needs.detect.outputs.stack == 'electron' || needs.detect.outputs.stack == 'node' || needs.detect.outputs.stack == 'node-cli' || needs.detect.outputs.stack == 'neutralino' }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Setup Rust
        if: ${{ needs.detect.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Go
        if: ${{ needs.detect.outputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Setup Flutter
        if: ${{ needs.detect.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0' }
      - name: Setup Java
        if: ${{ needs.detect.outputs.stack == 'java' || needs.detect.outputs.stack == 'android-native' }}
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup .NET
        if: ${{ needs.detect.outputs.stack == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-macos
          path: dist/
          if-no-files-found: ignore

  build-linux:
    <<: *base_build
    name: Build (linux)
    if: ${{ needs.parse.outputs.linux == 'true' }}
    runs-on: ubuntu-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: linux
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: ${{ needs.detect.outputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Setup Node
        if: ${{ needs.detect.outputs.stack == 'electron' || needs.detect.outputs.stack == 'node' || needs.detect.outputs.stack == 'node-cli' || needs.detect.outputs.stack == 'neutralino' }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Setup Rust
        if: ${{ needs.detect.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Go
        if: ${{ needs.detect.outputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Setup Flutter
        if: ${{ needs.detect.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0' }
      - name: Setup Java
        if: ${{ needs.detect.outputs.stack == 'java' || needs.detect.outputs.stack == 'android-native' }}
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup .NET
        if: ${{ needs.detect.outputs.stack == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-linux
          path: dist/
          if-no-files-found: ignore

  build-android:
    <<: *base_build
    name: Build (android)
    if: ${{ needs.parse.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: android
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: ${{ needs.detect.outputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Setup Node
        if: ${{ needs.detect.outputs.stack == 'electron' || needs.detect.outputs.stack == 'node' || needs.detect.outputs.stack == 'node-cli' || needs.detect.outputs.stack == 'neutralino' }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Setup Rust
        if: ${{ needs.detect.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Go
        if: ${{ needs.detect.outputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Setup Flutter
        if: ${{ needs.detect.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0' }
      - name: Setup Java
        if: ${{ needs.detect.outputs.stack == 'java' || needs.detect.outputs.stack == 'android-native' }}
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup .NET
        if: ${{ needs.detect.outputs.stack == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-android
          path: dist/
          if-no-files-found: ignore

  build-ios:
    <<: *base_build
    name: Build (ios)
    if: ${{ needs.parse.outputs.ios == 'true' }}
    runs-on: macos-latest
    env:
      STACK: ${{ needs.detect.outputs.stack }}
      PLATFORM: ios
      VERSION: ${{ needs.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: ${{ needs.detect.outputs.stack == 'python' }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Setup Node
        if: ${{ needs.detect.outputs.stack == 'electron' || needs.detect.outputs.stack == 'node' || needs.detect.outputs.stack == 'node-cli' || needs.detect.outputs.stack == 'neutralino' }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Setup Rust
        if: ${{ needs.detect.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Go
        if: ${{ needs.detect.outputs.stack == 'go' }}
        uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Setup Flutter
        if: ${{ needs.detect.outputs.stack == 'flutter' }}
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0' }
      - name: Setup Java
        if: ${{ needs.detect.outputs.stack == 'java' || needs.detect.outputs.stack == 'android-native' }}
        uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup .NET
        if: ${{ needs.detect.outputs.stack == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build
        run: ./.github/scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.stack || 'app' }}-ios
          path: dist/
          if-no-files-found: ignore

  # ---- 4. Release job (collects all artifacts) ----
  release:
    name: Publish Release
    needs: [detect, parse, build-windows, build-macos, build-linux, build-android, build-ios]
    if: ${{ (inputs.dry_run == false || github.event_name != 'workflow_dispatch') && always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts/ }
      - name: List downloaded artifacts
        run: ls -laR artifacts/ || true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.parse.outputs.version }}
          name: Release v${{ needs.parse.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.msi
            artifacts/**/*.tar.gz
